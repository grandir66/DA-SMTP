<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <linearGradient id="gMail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="gListener" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gRules" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="gAI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
    <linearGradient id="gAction" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="gQuar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Flusso di una mail in Domarc SMTP Relay</text>

  <!-- 1. Mittente esterno -->
  <g filter="url(#shadow)">
    <rect x="360" y="55" width="200" height="50" rx="10" fill="url(#gMail)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="460" y="78" text-anchor="middle" font-weight="600" fill="#1e3a8a">Mittente esterno</text>
    <text x="460" y="94" text-anchor="middle" font-size="11" fill="#475569">invio SMTP</text>
  </g>

  <!-- arrow 1->2 -->
  <line x1="460" y1="105" x2="460" y2="138" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. Listener -->
  <g filter="url(#shadow)">
    <rect x="320" y="140" width="280" height="55" rx="10" fill="url(#gListener)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="460" y="163" text-anchor="middle" font-weight="600" fill="#92400e">Listener SMTP (porta 25)</text>
    <text x="460" y="180" text-anchor="middle" font-size="11" fill="#78350f">riceve, valida, registra l'evento</text>
  </g>

  <!-- arrow 2->3 -->
  <line x1="460" y1="195" x2="460" y2="228" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Privacy bypass check (rombo) -->
  <g filter="url(#shadow)">
    <polygon points="460,230 580,275 460,320 340,275" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="460" y="270" text-anchor="middle" font-weight="600" fill="#334155">Privacy bypass?</text>
    <text x="460" y="287" text-anchor="middle" font-size="11" fill="#64748b">indirizzo in lista privacy</text>
  </g>

  <!-- arrow privacy -> ignore (sx) -->
  <line x1="340" y1="275" x2="220" y2="275" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="268" text-anchor="middle" font-size="11" font-style="italic" fill="#0f172a">Sì</text>

  <g filter="url(#shadow)">
    <rect x="60" y="248" width="160" height="55" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="140" y="271" text-anchor="middle" font-weight="600" fill="#334155">Drop silenzioso</text>
    <text x="140" y="288" text-anchor="middle" font-size="11" fill="#64748b">no log contenuto</text>
  </g>

  <!-- arrow privacy -> rule engine (giu) -->
  <line x1="460" y1="320" x2="460" y2="353" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="475" y="340" font-size="11" font-style="italic" fill="#0f172a">No</text>

  <!-- 4. Rule engine -->
  <g filter="url(#shadow)">
    <rect x="300" y="355" width="320" height="60" rx="10" fill="url(#gRules)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="460" y="380" text-anchor="middle" font-weight="600" fill="#3730a3">Rule Engine</text>
    <text x="460" y="397" text-anchor="middle" font-size="11" fill="#4338ca">cerca la regola che fa match (ordine priorità)</text>
  </g>

  <!-- 5 azioni: 5 box affiancati -->
  <line x1="460" y1="415" x2="460" y2="445" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="475" y="432" font-size="11" font-style="italic" fill="#0f172a">azione</text>

  <!-- Action: Ignore -->
  <g filter="url(#shadow)">
    <rect x="20" y="450" width="160" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="100" y="472" text-anchor="middle" font-weight="600" fill="#334155">ignore</text>
    <text x="100" y="488" text-anchor="middle" font-size="11" fill="#64748b">drop, nessun forward</text>
  </g>

  <!-- Action: Forward -->
  <g filter="url(#shadow)">
    <rect x="195" y="450" width="160" height="50" rx="8" fill="url(#gAction)" stroke="#16a34a" stroke-width="1.5"/>
    <text x="275" y="472" text-anchor="middle" font-weight="600" fill="#14532d">forward</text>
    <text x="275" y="488" text-anchor="middle" font-size="11" fill="#166534">inoltro al destinatario</text>
  </g>

  <!-- Action: AI classify -->
  <g filter="url(#shadow)">
    <rect x="370" y="450" width="180" height="50" rx="8" fill="url(#gAI)" stroke="#a855f7" stroke-width="1.5"/>
    <text x="460" y="472" text-anchor="middle" font-weight="600" fill="#581c87">ai_classify</text>
    <text x="460" y="488" text-anchor="middle" font-size="11" fill="#6b21a8">passa all'IA (Claude)</text>
  </g>

  <!-- Action: Quarantine -->
  <g filter="url(#shadow)">
    <rect x="565" y="450" width="160" height="50" rx="8" fill="url(#gQuar)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="645" y="472" text-anchor="middle" font-weight="600" fill="#7f1d1d">quarantine</text>
    <text x="645" y="488" text-anchor="middle" font-size="11" fill="#991b1b">in attesa di review</text>
  </g>

  <!-- Action: Create ticket -->
  <g filter="url(#shadow)">
    <rect x="740" y="450" width="160" height="50" rx="8" fill="url(#gAction)" stroke="#16a34a" stroke-width="1.5"/>
    <text x="820" y="472" text-anchor="middle" font-weight="600" fill="#14532d">create_ticket</text>
    <text x="820" y="488" text-anchor="middle" font-size="11" fill="#166534">apre ticket gestionale</text>
  </g>

  <!-- Linee dispatcher: dal rule engine alle 5 azioni -->
  <path d="M 460 415 L 460 440 L 100 440 L 100 450" fill="none" stroke="#475569" stroke-width="1.2"/>
  <path d="M 460 415 L 460 440 L 275 440 L 275 450" fill="none" stroke="#475569" stroke-width="1.2"/>
  <path d="M 460 415 L 460 440 L 645 440 L 645 450" fill="none" stroke="#475569" stroke-width="1.2"/>
  <path d="M 460 415 L 460 440 L 820 440 L 820 450" fill="none" stroke="#475569" stroke-width="1.2"/>

  <!-- Branch IA -->
  <line x1="460" y1="500" x2="460" y2="535" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="290" y="540" width="340" height="60" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="460" y="563" text-anchor="middle" font-weight="600" fill="#581c87">IA propone azione finale</text>
    <text x="460" y="582" text-anchor="middle" font-size="11" fill="#6b21a8">classificazione + urgenza + sintesi → forward / ticket / drop</text>
  </g>

  <!-- Legenda colori in basso a sinistra -->
  <g transform="translate(20, 540)">
    <rect x="0" y="0" width="240" height="70" rx="6" fill="#fff" stroke="#cbd5e1"/>
    <text x="10" y="18" font-size="11" font-weight="600" fill="#0f172a">Legenda</text>
    <rect x="10" y="26" width="14" height="10" fill="url(#gRules)" stroke="#6366f1"/>
    <text x="30" y="35" font-size="11" fill="#334155">Logica deterministica</text>
    <rect x="10" y="42" width="14" height="10" fill="url(#gAI)" stroke="#a855f7"/>
    <text x="30" y="51" font-size="11" fill="#334155">Logica IA (semantica)</text>
    <rect x="10" y="58" width="14" height="10" fill="url(#gAction)" stroke="#16a34a"/>
    <text x="30" y="67" font-size="11" fill="#334155">Azione di consegna</text>
  </g>

  <!-- Tutto è tracciato -->
  <text x="900" y="608" text-anchor="end" font-size="10" font-style="italic" fill="#64748b">Ogni passaggio è registrato in Eventi + Activity Live</text>
</svg>
