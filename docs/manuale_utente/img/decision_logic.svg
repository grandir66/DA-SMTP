<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 1080" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <linearGradient id="gQ" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/></linearGradient>
    <linearGradient id="gG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/></linearGradient>
    <linearGradient id="gT" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0e7ff"/><stop offset="100%" stop-color="#c7d2fe"/></linearGradient>
    <linearGradient id="gC" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#cffafe"/><stop offset="100%" stop-color="#a5f3fc"/></linearGradient>
  </defs>

  <text x="590" y="34" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">Dove metto una nuova regola? — logica post M035</text>
  <text x="590" y="56" font-size="13" text-anchor="middle" fill="#475569">Filtro contratto/profilo cliente = match_customer_groups · Filtro orario = match_in_service / match_at_hours</text>

  <rect x="60" y="80" width="1060" height="100" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="80" y="106" font-size="14" font-weight="700" fill="#78350f">REGOLA D'ORO (post M035)</text>
  <text x="80" y="128" font-size="12" fill="#92400e"><tspan font-weight="600">match_customer_groups</tspan> = il filtro per CONTRATTO o TIPO di servizio del cliente (H24, EXT, STD, no-contract).</text>
  <text x="80" y="146" font-size="12" fill="#92400e"><tspan font-weight="600">match_in_service / match_at_hours</tspan> = il filtro TEMPORALE (DENTRO/FUORI orario operativo, fasce esplicite).</text>
  <text x="80" y="164" font-size="12" fill="#92400e"><tspan font-weight="600">rule_set_id</tspan> = solo organizzazione UI (`globali`, `std_window`, `ext_window`, `h24_window`). NON gating runtime.</text>

  <text x="60" y="212" font-size="15" font-weight="700" fill="#0f172a">Decision tree</text>

  <rect x="60" y="226" width="320" height="90" rx="10" fill="url(#gQ)" stroke="#d97706"/>
  <text x="220" y="252" font-size="13" font-weight="700" text-anchor="middle" fill="#7c2d12">1. Vale per QUALSIASI cliente?</text>
  <text x="220" y="270" font-size="11" text-anchor="middle" fill="#92400e">(catch-all, system alerts, AI classify, sistemi automatici)</text>
  <text x="220" y="290" font-size="11" font-weight="600" text-anchor="middle" fill="#7c2d12">SI - match_customer_groups VUOTO</text>
  <text x="220" y="306" font-size="10" font-style="italic" text-anchor="middle" fill="#92400e">(rule_set_id consigliato: `globali`)</text>

  <line x1="380" y1="271" x2="430" y2="271" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="430" y="240" width="280" height="64" rx="8" fill="url(#gG)" stroke="#16a34a"/>
  <text x="570" y="260" font-size="12" font-weight="700" text-anchor="middle" fill="#14532d">match_customer_groups = (vuoto)</text>
  <text x="570" y="278" font-size="10" text-anchor="middle" fill="#166534">Esempio: CloudTIK alert, AI classify,</text>
  <text x="570" y="293" font-size="10" text-anchor="middle" fill="#166534">catch-all, thread continuation seed</text>

  <line x1="220" y1="316" x2="220" y2="356" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="60" y="356" width="320" height="100" rx="10" fill="url(#gQ)" stroke="#d97706"/>
  <text x="220" y="382" font-size="13" font-weight="700" text-anchor="middle" fill="#7c2d12">2. Specifica per livello di contratto?</text>
  <text x="220" y="400" font-size="11" text-anchor="middle" fill="#92400e">H24 / EXT / STD / no-contract</text>
  <text x="220" y="420" font-size="11" font-weight="600" text-anchor="middle" fill="#7c2d12">SI - seleziona gruppi cliente</text>
  <text x="220" y="436" font-size="10" font-style="italic" text-anchor="middle" fill="#92400e">(es. h24_customers, std_customers)</text>

  <line x1="380" y1="406" x2="430" y2="406" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="430" y="370" width="280" height="80" rx="8" fill="url(#gC)" stroke="#0891b2"/>
  <text x="570" y="392" font-size="12" font-weight="700" text-anchor="middle" fill="#164e63">match_customer_groups = csv</text>
  <text x="438" y="412" font-size="10" fill="#0e7490">Es: "h24_customers" - solo clienti H24</text>
  <text x="438" y="426" font-size="10" fill="#0e7490">Es: "h24_customers,ext_customers" - H24+EXT</text>
  <text x="438" y="440" font-size="10" font-style="italic" fill="#155e75">(M034) i gruppi sono self-contained</text>

  <line x1="220" y1="456" x2="220" y2="496" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="60" y="496" width="320" height="100" rx="10" fill="url(#gQ)" stroke="#d97706"/>
  <text x="220" y="522" font-size="13" font-weight="700" text-anchor="middle" fill="#7c2d12">3. Dipende dall'orario?</text>
  <text x="220" y="540" font-size="11" text-anchor="middle" fill="#92400e">Fuori orario / dentro orario / orari custom</text>
  <text x="220" y="560" font-size="11" font-weight="600" text-anchor="middle" fill="#7c2d12">SI - match_in_service o match_at_hours</text>
  <text x="220" y="576" font-size="10" font-style="italic" text-anchor="middle" fill="#92400e">in_service usa il profilo del singolo cliente</text>

  <line x1="380" y1="546" x2="430" y2="546" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="430" y="510" width="280" height="80" rx="8" fill="url(#gT)" stroke="#4338ca"/>
  <text x="570" y="530" font-size="12" font-weight="700" text-anchor="middle" fill="#312e81">match_in_service tristate</text>
  <text x="438" y="550" font-size="10" fill="#3730a3">DENTRO orario operativo del cliente</text>
  <text x="438" y="564" font-size="10" fill="#3730a3">FUORI orario operativo del cliente</text>
  <text x="438" y="578" font-size="10" fill="#3730a3">qualsiasi (vuoto)</text>

  <text x="60" y="640" font-size="15" font-weight="700" fill="#0f172a">Ricette pratiche (esempi reali)</text>

  <rect x="60" y="654" width="1060" height="380" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>

  <rect x="60" y="654" width="1060" height="32" fill="#f1f5f9"/>
  <text x="76" y="675" font-size="11" font-weight="700" fill="#0f172a">Use case</text>
  <text x="290" y="675" font-size="11" font-weight="700" fill="#0f172a">match_customer_groups</text>
  <text x="500" y="675" font-size="11" font-weight="700" fill="#0f172a">match_in_service / at_hours</text>
  <text x="720" y="675" font-size="11" font-weight="700" fill="#0f172a">action</text>
  <text x="900" y="675" font-size="11" font-weight="700" fill="#0f172a">rule_set_id (UI)</text>

  <line x1="60" y1="686" x2="1120" y2="686" stroke="#e2e8f0"/>
  <text x="76" y="710" font-size="11" fill="#0f172a">Auto-reply fuori orario per H24</text>
  <text x="290" y="710" font-size="10" font-family="monospace" fill="#0e7490">h24_customers</text>
  <text x="500" y="710" font-size="11" fill="#0f172a">FUORI</text>
  <text x="720" y="710" font-size="10" font-family="monospace" fill="#0f172a">auto_reply (template paid_option)</text>
  <text x="900" y="710" font-size="10" font-family="monospace" fill="#475569">h24_window</text>

  <line x1="60" y1="722" x2="1120" y2="722" stroke="#e2e8f0"/>
  <text x="76" y="746" font-size="11" fill="#0f172a">Crea ticket NORMALE clienti STD</text>
  <text x="290" y="746" font-size="10" font-family="monospace" fill="#0e7490">std_customers</text>
  <text x="500" y="746" font-size="11" fill="#0f172a">DENTRO</text>
  <text x="720" y="746" font-size="10" font-family="monospace" fill="#0f172a">create_ticket (urgenza=NORMALE)</text>
  <text x="900" y="746" font-size="10" font-family="monospace" fill="#475569">std_window</text>

  <line x1="60" y1="758" x2="1120" y2="758" stroke="#e2e8f0"/>
  <text x="76" y="782" font-size="11" fill="#0f172a">Cloudtik alerts (qualsiasi cliente)</text>
  <text x="290" y="782" font-size="10" font-style="italic" fill="#475569">(vuoto)</text>
  <text x="500" y="782" font-size="10" font-style="italic" fill="#475569">(qualsiasi)</text>
  <text x="720" y="782" font-size="10" font-family="monospace" fill="#0f172a">create_ticket + match_subject_regex</text>
  <text x="900" y="782" font-size="10" font-family="monospace" fill="#475569">globali</text>

  <line x1="60" y1="794" x2="1120" y2="794" stroke="#e2e8f0"/>
  <text x="76" y="818" font-size="11" fill="#0f172a">No-contract: sempre billable</text>
  <text x="290" y="818" font-size="10" font-family="monospace" fill="#0e7490">no_contract_customers</text>
  <text x="500" y="818" font-size="10" font-style="italic" fill="#475569">(qualsiasi)</text>
  <text x="720" y="818" font-size="10" font-family="monospace" fill="#0f172a">auto_reply (always_billable)</text>
  <text x="900" y="818" font-size="10" font-family="monospace" fill="#475569">globali</text>

  <line x1="60" y1="830" x2="1120" y2="830" stroke="#e2e8f0"/>
  <text x="76" y="854" font-size="11" fill="#0f172a">Tecnici no fuori orario (forward H24)</text>
  <text x="290" y="854" font-size="10" font-style="italic" fill="#475569">(vuoto)</text>
  <text x="500" y="854" font-size="11" fill="#0f172a">FUORI + match_to_group_id=tecnici</text>
  <text x="720" y="854" font-size="10" font-family="monospace" fill="#0f172a">forward_to_emails=h24@domarc.it</text>
  <text x="900" y="854" font-size="10" font-family="monospace" fill="#475569">globali</text>

  <line x1="60" y1="866" x2="1120" y2="866" stroke="#e2e8f0"/>
  <text x="76" y="890" font-size="11" fill="#0f172a">H24 codice in subject (qualsiasi)</text>
  <text x="290" y="890" font-size="10" font-style="italic" fill="#475569">(vuoto)</text>
  <text x="500" y="890" font-size="11" fill="#0f172a">match_subject_regex AUTH-|H24-</text>
  <text x="720" y="890" font-size="10" font-family="monospace" fill="#0f172a">create_authorized_ticket</text>
  <text x="900" y="890" font-size="10" font-family="monospace" fill="#475569">globali</text>

  <line x1="60" y1="902" x2="1120" y2="902" stroke="#e2e8f0"/>
  <text x="76" y="926" font-size="11" fill="#0f172a"><tspan font-weight="700" fill="#7c3aed">Thread continuation (M036)</tspan></text>
  <text x="290" y="926" font-size="10" font-style="italic" fill="#475569">(vuoto)</text>
  <text x="500" y="926" font-size="11" fill="#7c3aed">match_is_thread_continuation = SI</text>
  <text x="720" y="926" font-size="10" font-family="monospace" fill="#0f172a">default_delivery (no nuovo ticket)</text>
  <text x="900" y="926" font-size="10" font-family="monospace" fill="#475569">globali (priority=5)</text>

  <line x1="60" y1="938" x2="1120" y2="938" stroke="#e2e8f0"/>
  <text x="76" y="962" font-size="11" fill="#0f172a"><tspan font-weight="700" fill="#16a34a">Catch-all finale</tspan></text>
  <text x="290" y="962" font-size="10" font-style="italic" fill="#475569">(vuoto)</text>
  <text x="500" y="962" font-size="10" font-style="italic" fill="#475569">(qualsiasi)</text>
  <text x="720" y="962" font-size="10" font-family="monospace" fill="#0f172a">default_delivery</text>
  <text x="900" y="962" font-size="10" font-family="monospace" fill="#475569">globali (priority=999)</text>

  <line x1="60" y1="974" x2="1120" y2="974" stroke="#e2e8f0"/>
  <text x="76" y="998" font-size="11" fill="#0f172a"><tspan font-weight="700" fill="#64748b">Shadow test (qualsiasi regola)</tspan></text>
  <text x="290" y="998" font-size="10" font-style="italic" fill="#475569">(qualsiasi)</text>
  <text x="500" y="998" font-size="10" font-style="italic" fill="#475569">(qualsiasi)</text>
  <text x="720" y="998" font-size="10" font-family="monospace" fill="#475569">action loggata, NON eseguita</text>
  <text x="900" y="998" font-size="11" fill="#64748b">shadow_mode=1 (M033)</text>

  <text x="76" y="1024" font-size="10" font-style="italic" fill="#475569">M034: i gruppi cliente sono auto-popolati da regole di membership su contract_type / tipologia_servizio / JSON custom — definite in /customer-groups/&lt;id&gt;/membership-rules</text>
</svg>
